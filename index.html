<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 아재개그 생성기</title>
    <!-- 웹 폰트 (Pretendard) -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
        rel="stylesheet" />
    <!-- 아이콘 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #1e1b4b;
            --container-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #ec4899;
            --accent-hover: #db2777;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(15, 23, 42, 0.5);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-attachment: fixed;
            padding: 2rem 1rem;
        }

        /* 배경 애니메이션 효과 */
        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 10s infinite alternate ease-in-out;
            border-radius: 50%;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 400px;
            height: 400px;
            background-color: var(--primary);
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 300px;
            height: 300px;
            background-color: var(--accent);
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(50px, 50px) scale(1.1);
            }
        }

        /* 메인 컨테이너 */
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--container-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow);
            z-index: 10;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* 화면 전환 */
        .screen {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 0.5s ease;
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 버튼 및 폼 요소 */
        input[type="text"] {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        button {
            width: 100%;
            padding: 1.2rem;
            border-radius: 12px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 1rem;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .btn-accent {
            background-color: var(--accent);
            color: white;
            padding: 0.8rem;
            font-size: 0.95rem;
            border-radius: 8px;
        }

        .btn-accent:hover {
            background-color: var(--accent-hover);
        }

        .action-row {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        /* 아재개그 카드 리스트 */
        .joke-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .joke-list::-webkit-scrollbar {
            width: 6px;
        }

        .joke-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .joke-card {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: slideIn 0.5s ease backwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .joke-content {
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1rem;
        }

        .joke-q {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #e2e8f0;
        }

        .joke-a {
            font-size: 1.5rem;
            font-weight: 800;
            color: #38bdf8;
        }

        /* 개별 피드백 섹션 */
        .feedback-section {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .stars-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stars {
            display: flex;
            gap: 0.4rem;
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .stars i {
            transition: color 0.2s, transform 0.2s;
        }

        .stars i.active {
            color: #fbbf24;
            animation: pop 0.3s;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        .comment-area {
            display: flex;
            gap: 0.5rem;
        }

        .comment-area input {
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            border-radius: 8px;
        }

        .comment-area button {
            width: auto;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            border-radius: 8px;
            white-space: nowrap;
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            font-size: 0.85rem;
        }

        .comment-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            border-left: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
        }

        /* 등록 폼 */
        .add-joke-form {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px dashed var(--border);
            display: none;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        .add-joke-form.active {
            display: flex;
        }

        /* 토스트 알림 */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #10b981;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

        // 앱 초기화 및 데이터 병합
        let allJokes = [...initialJokeDB];
        let shownJokesHistory = []; // 최근 보여준 15개 ID 기억 (중복 방지)

        const screens = {
            home: document.getElementById('home-screen'),
            result: document.getElementById('result-screen')
        };
        const listContainer = document.getElementById('joke-list-container');
        const toastEl = document.getElementById('toast');

        // 사용자 추가 데이터 로드 (웹검색 대체 기능)
        function loadCustomJokes() {
            const custom = localStorage.getItem('custom_jokes');
            if (custom) {
                const customJokes = JSON.parse(custom);
                allJokes = [...initialJokeDB, ...customJokes];
            }
        }

        // 초기 실행
        loadCustomJokes();

        // 토스트
        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 2500);
        }

        function showScreen(screenId) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function toggleAddForm() {
            const form = document.getElementById('add-form');
            form.classList.toggle('active');
        }

        // 간단한 문자열 유사도 검사 함수 (Levenshtein distance 기반 변형 또는 단순 키워드 포함 여부)
        function checkSimilarity(newQ, newA) {
            // 1. 완전히 동일한 질문이나 답변이 있는지 체크
            const exactMatch = allJokes.find(j => j.q === newQ || j.a === newA);
            if (exactMatch) {
                return { isSimilar: true, reason: '완전히 동일한 질문이나 답변이 있습니다.', similarJoke: exactMatch };
            }

            // 2. 키워드 유사도 체크 (띄어쓰기 제거 후 포함 여부로 간단히 체크)
            const simplify = str => str.replace(/\\s+/g, '').replace(/[?!.,]/g, '');
            const simNewQ = simplify(newQ);
            const simNewA = simplify(newA);

            const similarMatch = allJokes.find(j => {
                const simQ = simplify(j.q);
                const simA = simplify(j.a);
                // 질문이나 답변이 서로 길게 포함되는 경우 유사하다고 판단 (3글자 이상 일치 기준)
                if (simNewQ.length > 2 && simQ.includes(simNewQ)) return true;
                if (simQ.length > 2 && simNewQ.includes(simQ)) return true;
                if (simNewA.length > 2 && simA.includes(simNewA)) return true;
                if (simA.length > 2 && simNewA.includes(simA)) return true;
                return false;
            });

            if (similarMatch) {
                return { isSimilar: true, reason: '유사한 키워드를 가진 아재개그가 있습니다.', similarJoke: similarMatch };
            }

            return { isSimilar: false };
        }

        // 나만의 아재개그 추가
        function addNewJoke() {
            const q = document.getElementById('new-q').value.trim();
            const a = document.getElementById('new-a').value.trim();

            if (!q || !a) {
                showToast('질문과 정답을 모두 입력해주세요!');
                return;
            }

            // 중복/유사도 검사
            const similarityCheck = checkSimilarity(q, a);
            if (similarityCheck.isSimilar) {
                const confirmMsg = `${similarityCheck.reason}\n\n[유사 아재개그]\nQ: ${similarityCheck.similarJoke.q}\nA: ${similarityCheck.similarJoke.a}\n\n그래도 등록하시겠습니까?`;
                if (!confirm(confirmMsg)) {
                    return; // 사용자가 취소하면 등록 중단
                }
            }

            const custom = localStorage.getItem('custom_jokes');
            let customJokes = custom ? JSON.parse(custom) : [];

            const newJoke = {
                id: 'custom_' + Date.now(),
                q: q,
                a: a
            };

            customJokes.push(newJoke);
            localStorage.setItem('custom_jokes', JSON.stringify(customJokes));

            // 즉시 반영
            allJokes.push(newJoke);
            document.getElementById('new-q').value = '';
            document.getElementById('new-a').value = '';
            toggleAddForm();

            showToast('성공적으로 저장되어 다음 랜덤 검색에 포함됩니다!');
        }

        // 5개 랜덤 추출 (최근 본 것과 겹치지 않게)
        function generateJokes() {
            listContainer.innerHTML = '';

            // 너무 많이 봤으면 히스토리 초기화
            if (shownJokesHistory.length >= allJokes.length - 10) {
                shownJokesHistory = [];
            }

            let availableJokes = allJokes.filter(j => !shownJokesHistory.includes(j.id));

            // 만약 남은 게 5개 미만이면 전체에서 다시 뽑음 (안전장치)
            if (availableJokes.length < 5) {
                availableJokes = [...allJokes];
                shownJokesHistory = [];
            }

            // 섞기 (Fisher-Yates)
            for (let i = availableJokes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availableJokes[i], availableJokes[j]] = [availableJokes[j], availableJokes[i]];
            }

            const selectedJokes = availableJokes.slice(0, 5);

            // 히스토리에 추가
            selectedJokes.forEach(j => {
                shownJokesHistory.push(j.id);
                renderJokeCard(j, listContainer);
            });

            // 히스토리 크기 제한 유지
            if (shownJokesHistory.length > 20) {
                shownJokesHistory = shownJokesHistory.slice(shownJokesHistory.length - 20);
            }

            showScreen('result-screen');
        }

        // DOM 생성: 개별 아재개그 카드 렌더링
        function renderJokeCard(joke, parentNode) {
            const data = getFeedback(joke.id);
            const rating = data.rating || 0;
            const comments = data.comments || [];

            const card = document.createElement('div');
            card.className = 'joke-card';
            // 순서대로 나타나는 애니메이션(지연) 적용을 위해 랜덤 인덱스 꼼수
            card.style.animationDelay = `${Math.random() * 0.3}s`;

            // HTML 구조
            card.innerHTML = `
                    <div class="joke-content">
                    <div class="joke-q">Q. ${joke.q}</div>
                    <div class="joke-a">A. ${joke.a}</div>
                </div>

                    <div class="feedback-section">
                        <div class="stars-row">
                            <div class="stars" id="stars-${joke.id}">
                                ${[1, 2, 3, 4, 5].map(i => `<i class="fa-solid fa-star ${i <= rating ? 'active' : ''}" data-val="${i}" onclick="setRating('${joke.id}', ${i})"></i>`).join('')}
                            </div>
                            <button class="btn-accent" onclick="shareJoke('${joke.id}', \`${joke.q}\`, \`${joke.a}\`)">
                                <i class="fa-solid fa-share-nodes"></i> 공유
                            </button>
                        </div>

                        <div class="comment-area">
                            <input type="text" id="input-${joke.id}" placeholder="댓글 달기..." onkeypress="if(event.key==='Enter') addComment('${joke.id}')">
                                <button class="btn-primary" onclick="addComment('${joke.id}')">등록</button>
                        </div>

                        <div class="comments-list" id="comments-${joke.id}">
                            ${comments.map(c => `<div class="comment-item"><span>${c.text}</span><span style="color:var(--text-muted);">${c.date}</span></div>`).join('')}
                        </div>
                    </div>
                `;
            parentNode.appendChild(card);
        }

        // 로컬스토리지 피드백 로드
        function getFeedback(id) {
            const allFb = JSON.parse(localStorage.getItem('joke_feedback_v2') || '{}');
            return allFb[id] || { rating: 0, comments: [] };
        }

        // 로컬스토리지 피드백 저장
        function saveFeedback(id, newData) {
            const allFb = JSON.parse(localStorage.getItem('joke_feedback_v2') || '{}');
            allFb[id] = { ...getFeedback(id), ...newData };
            localStorage.setItem('joke_feedback_v2', JSON.stringify(allFb));
        }

        // 별점 주기
        window.setRating = function (id, value) {
            saveFeedback(id, { rating: value });
            // UI 업데이트
            const container = document.getElementById(`stars-${id}`);
            const stars = container.querySelectorAll('i');
            stars.forEach((s, idx) => {
                if (idx < value) s.classList.add('active');
                else s.classList.remove('active');
            });
            showToast('별점이 등록되었습니다!');
        };

        // 댓글 달기
        window.addComment = function (id) {
            const input = document.getElementById(`input-${id}`);
            const text = input.value.trim();
            if (!text) return;

            const data = getFeedback(id);
            const comments = data.comments || [];

            const newComment = {
                text: text,
                date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            };
            comments.unshift(newComment); // 최신이 위로
            saveFeedback(id, { comments: comments });

            // UI 업데이트
            const list = document.getElementById(`comments-${id}`);
            const el = document.createElement('div');
            el.className = 'comment-item';
            el.innerHTML = `<span>${newComment.text}</span> <span style="color:var(--text-muted);">${newComment.date}</span>`;
            list.insertBefore(el, list.firstChild);

            input.value = '';
            showToast('댓글이 등록되었습니다!');
        };

        // 공유하기 기능
        window.shareJoke = async function (id, q, a) {
            const text = `[😆 오늘의 아재개그]\n\nQ.${q} \nA.${a} \n\n나만의 아재개그 생성기에서 더 많은 웃음을 찾아보세요!`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: '아재개그',
                        text: text,
                        url: window.location.href
                    });
                    showToast('성공적으로 공유했습니다!');
                } catch (e) {
                    if (e.name !== 'AbortError') showToast('공유 실패');
                }
            } else {
                try {
                    await navigator.clipboard.writeText(text + "\n" + window.location.href);
                    showToast('클립보드에 복사되었습니다!');
                } catch (e) {
                    showToast('복사 기능을 지원하지 않습니다.');
                }
            }
        };
    </script>
