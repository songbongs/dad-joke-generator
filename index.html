<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아재개그 랜덤 룰렛 생성기 😂</title>
    <!-- Google Fonts for Modern Typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>

<body>
    <!-- Configuration (Users can edit these directly in index.html) -->
    <script>
        const CONFIG = {
            // Google Sheets Query (gviz) URL 
            // example: https://docs.google.com/spreadsheets/d/1VekEfjyPiVVh-MPiE8y6c_SEDNjFW0KwV2YDytul7cA/gviz/tq?tqx=out:json&sheet=jokes
            GVIZ_URL: "https://docs.google.com/spreadsheets/d/1VekEfjyPiVVh-MPiE8y6c_SEDNjFW0KwV2YDytul7cA/gviz/tq?tqx=out:json&sheet=jokes",

            // Google Apps Script Web App URL
            SCRIPT_POST_URL: "https://script.google.com/macros/s/AKfycbxZbxdQerx6t8vMpdFwSS0m-dp1HXhok8UqEa1Rbj2cSjAiUi5JLEVrQ9JM_fcNnv2p/exec",

            // Admin PIN for hiding jokes
            ADMIN_PIN: "1202"
        };
    </script>

    <div class="background-bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <header class="glass-header">
        <div class="header-content">
            <h1>😂 아재개그 룰렛</h1>
            <div class="controls">
                <button id="nav-home" class="icon-btn" title="처음으로">🏠</button>
                <button id="theme-toggle" class="icon-btn" title="다크 모드 전환">🌙</button>
                <button id="nav-favorites" class="icon-btn" title="즐겨찾기 목록">❤️</button>
                <button id="nav-add" class="icon-btn" title="새 개그 추가">➕</button>
                <button id="nav-admin" class="icon-btn" title="관리자 모드">⚙️</button>
            </div>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="🔍 검색어, 태그...">
            <select id="filter-category" class="mobile-hide">
                <option value="">모든 카테고리</option>
            </select>
        </div>
    </header>

    <main class="container">
        <!-- Start/Intro View -->
        <section id="view-intro" class="view-section active">
            <div class="intro-panel glass-panel">
                <h2 class="title-bounce">아재력 테스트! <br>준비되셨나요? 😎</h2>
                <p style="word-break: keep-all;">엄선된 고퀄리티 아재개그가 당신을 기다립니다.</p>
                <button id="btn-start-roulette" class="btn-primary pulse-anim w-100 btn-large">바로 시작하기!</button>
            </div>
        </section>

        <!-- Main Roulette View -->
        <section id="view-roulette" class="view-section hidden">
            <div class="roulette-container" id="roulette-spinner">
                <div class="card-scene">
                    <div class="joke-card" id="joke-card">
                        <div class="card-face card-front">
                            <span class="category-badge" id="card-category">카테고리</span>
                            <h2 id="card-question">질문이 여기에 표시됩니다!</h2>
                            <p class="flip-hint">➡️ 클릭해서 정답 확인</p>
                            <div class="tags-container" id="card-tags"></div>
                        </div>
                        <div class="card-face card-back">
                            <h2 id="card-answer" class="punchline">정답!</h2>
                            <div class="card-actions">
                                <div class="action-row">
                                    <button id="btn-favorite" class="action-btn">❤️ 즐겨찾기</button>
                                    <button id="btn-share" class="action-btn">🔗 공유하기</button>
                                </div>
                                <div class="rating-widget">
                                    <span>평가: </span>
                                    <div class="stars" id="rating-stars">
                                        <span data-val="1">⭐</span><span data-val="2">⭐</span>
                                        <span data-val="3">⭐</span><span data-val="4">⭐</span><span
                                            data-val="5">⭐</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="spin-controls">
                <button id="btn-spin" class="btn-primary pulse-anim">🎲 랜덤 개그 돌리기!</button>
            </div>

            <div id="admin-hide-container" class="hidden glass-panel admin-hide-panel">
                <p>⚠️ 이 개그를 블랙리스트 처리하시겠습니까?</p>
                <input type="password" id="admin-pin-input" placeholder="PIN 번호">
                <div class="action-row" style="margin-top: 1rem;">
                    <button id="btn-cancel-hide" class="btn-secondary">취소</button>
                    <button id="btn-hide-joke" class="btn-danger">숨기기</button>
                </div>
            </div>
        </section>

        <!-- Search Results View -->
        <section id="view-search" class="view-section hidden">
            <div class="section-header">
                <h2>검색 결과</h2>
                <button class="btn-secondary" id="btn-back-from-search">돌아가기</button>
            </div>
            <div class="grid-container" id="search-results-grid"></div>
        </section>

        <!-- Favorites View -->
        <section id="view-favorites" class="view-section hidden">
            <div class="section-header">
                <h2>내 보관함 ❤️</h2>
                <button class="btn-secondary" id="btn-back-from-fav">돌아가기</button>
            </div>
            <div class="grid-container" id="favorites-grid"></div>
        </section>

        <!-- Add Joke View -->
        <section id="view-add" class="view-section hidden">
            <div class="glass-panel form-panel">
                <div class="section-header">
                    <h2>✏️ 나만의 아재개그 추가하기</h2>
                    <button class="btn-secondary" id="btn-back-from-add">취소</button>
                </div>
                <!-- Form targeting hidden iframe -->
                <form id="add-joke-form" action="" method="POST" target="hidden_iframe">
                    <input type="hidden" name="action" value="add">
                    <div class="form-group">
                        <label>질문 (Question)</label>
                        <input type="text" name="question" required placeholder="예: 소가 웃으면?">
                    </div>
                    <div class="form-group">
                        <label>정답 (Answer)</label>
                        <input type="text" name="answer" required placeholder="예: 우하하">
                    </div>
                    <div class="form-group">
                        <label>카테고리</label>
                        <select name="category" id="add-category-select">
                            <option value="발음 말장난">발음 말장난</option>
                            <option value="숫자 말장난">숫자 말장난</option>
                            <option value="동물 개그">동물 개그</option>
                            <option value="사물 개그">사물 개그</option>
                            <option value="언어유희">언어유희</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>태그 (쉼표로 구분)</label>
                        <input type="text" name="tags" placeholder="예: 소, 동물, 웃음">
                    </div>
                    <button type="submit" class="btn-primary w-100" id="btn-submit-add">제출하기!</button>
                </form>
            </div>
        </section>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="overlay">
            <div class="loader"></div>
            <p>데이터를 불러오는 중입니다...</p>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>
    </main>

    <!-- Hidden form for rating to avoid CORS -->
    <form id="rate-joke-form" action="" method="POST" target="hidden_iframe" style="display:none;">
        <input type="hidden" name="action" value="rate">
        <input type="hidden" name="id" id="rate-id">
        <input type="hidden" name="stars" id="rate-stars">
    </form>

    <!-- Hidden form for admin hiding -->
    <form id="hide-joke-form" action="" method="POST" target="hidden_iframe" style="display:none;">
        <input type="hidden" name="action" value="hide">
        <input type="hidden" name="id" id="hide-id">
        <input type="hidden" name="pin" id="hide-pin">
    </form>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <script src="assets/app.js"></script>
</body>

</html>
